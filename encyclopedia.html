<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mode Encyclopedia</title>
    <style>
        @property --x1 { syntax: '<percentage>'; inherits: false; initial-value: 30%; }
        @property --y1 { syntax: '<percentage>'; inherits: false; initial-value: -10%; }
        @property --x2 { syntax: '<percentage>'; inherits: false; initial-value: 85%; }
        @property --y2 { syntax: '<percentage>'; inherits: false; initial-value: 85%; }
        @property --x3 { syntax: '<percentage>'; inherits: false; initial-value: 10%; }
        @property --y3 { syntax: '<percentage>'; inherits: false; initial-value: 50%; }

        :root {
            --bg-color: #080306; 
            --card-bg: rgba(16, 10, 13, 0.85); 
            --text-color: #f0f3f8;
            --border-alpha: rgba(255, 255, 255, 0.07);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 30px 20px;
            min-height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; align-items: center;
            background-image: 
                radial-gradient(circle at var(--x1) var(--y1), #240510 0%, transparent 65%),
                radial-gradient(circle at var(--x2) var(--y2), #12040e 0%, transparent 60%),
                radial-gradient(circle at var(--x3) var(--y3), #17050f 0%, transparent 55%);
            animation: seamlessAurora 20s ease-in-out infinite alternate;
            overflow-x: hidden;
        }

        @keyframes seamlessAurora {
            0% { --x1: 20%; --y1: -10%; --x2: 85%; --y2: 85%; --x3: 10%; --y3: 50%; }
            100% { --x1: 15%; --y1: 95%; --x2: 85%; --y2: -10%; --x3: 35%; --y3: 15%; }
        }

        .nav-btn {
            position: fixed; top: 20px; left: 20px; z-index: 9999; color: rgba(255, 255, 255, 0.65);
            text-decoration: none; font-size: 11px; font-weight: 500; border: 1px solid var(--border-alpha);
            padding: 8px 16px; border-radius: 20px; background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px); letter-spacing: 1px; transition: all 0.3s; cursor: pointer;
        }
        .nav-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }

        h1 { font-weight: 200; letter-spacing: 4px; font-size: 28px; margin: 40px 0 10px 0; color: #fff; text-align: center; }
        .subtitle { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 30px; letter-spacing: 1px; }

        .encyclopedia-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px; width: 100%; max-width: 1200px; position: relative; z-index: 2;
        }

        .enc-card {
            background: var(--card-bg); border: 1px solid var(--border-alpha); border-radius: 14px;
            padding: 20px; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 10px;
        }

        .card-header { border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 8px; margin-bottom: 4px; }
        .mode-name { font-size: 18px; font-weight: 400; color: #fff; }
        .parent-scale { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

        .info-row { display: flex; flex-direction: column; gap: 2px; }
        .label { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 12px; color: rgba(255,255,255,0.85); line-height: 1.4; }
        .formula-val { font-family: monospace; color: #eab308; }

        .fade-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #080306; z-index: 10000; pointer-events: none; opacity: 1; transition: opacity 0.4s ease; }
    </style>
</head>
<body>
    <div class="fade-overlay" id="fadeOverlay"></div>
    <button onclick="navigateWithFade('index.html')" class="nav-btn">➔ BACK TO WHEEL</button>

    <h1>Mode Encyclopedia</h1>
    <p class="subtitle">COMPREHENSIVE MODAL SYSTEM OVERVIEW</p>

    <div class="encyclopedia-grid" id="encyclopediaGrid"></div>

    <script>
        const encyclopediaData = [
            { name: "Lydian", parent: "Major Scale", formula: "1 2 3 ♯4 5 6 7", characteristic: "♯4 (Brightest Major feel)", chord: "M7", usage: "Film scoring, ethereal jazz fusion, Joe Satriani style.", related: "Ionian, Lydian Dominant" },
            { name: "Ionian", parent: "Major Scale", formula: "1 2 3 4 5 6 7", characteristic: "Natural 4", chord: "M7", usage: "Pop, classical hymns, traditional Western music melodies.", related: "Lydian, Mixolydian" },
            { name: "Mixolydian", parent: "Major Scale", formula: "1 2 3 4 5 6 ♭7", characteristic: "♭7 (Dominant marker)", chord: "7", usage: "Blues, Rock & Roll, Funk riffs, Classic Rock tracks.", related: "Ionian, Dorian" },
            { name: "Dorian", parent: "Major Scale", formula: "1 2 ♭3 4 5 6 ♭7", characteristic: "♮6 (Sophisticated minor)", chord: "m7", usage: "Jazz standards (So What), Modal Jazz, Funk grooves.", related: "Mixolydian, Aeolian" },
            { name: "Aeolian", parent: "Major Scale", formula: "1 2 ♭3 4 5 ♭6 ♭7", characteristic: "♭6 (Natural Minor blueprint)", chord: "m7", usage: "Heavy metal, rock ballads, epic cinematic soundtracks.", related: "Dorian, Phrygian" },
            { name: "Lydian Dominant", parent: "Melodic Minor", formula: "1 2 3 ♯4 5 6 ♭7", characteristic: "♯4 and ♭7 combined", chord: "7", usage: "Acoustic scale feel, non-resolving backdoor dominant chords.", related: "Lydian, Mixolydian ♭6" },
            { name: "Phrygian Dominant", parent: "Harmonic Minor", formula: "1 ♭2 3 4 5 ♭6 ♭7", characteristic: "Major 3rd with ♭2", chord: "7", usage: "Spanish Flamenco, Middle Eastern textures, Metal solos.", related: "Harmonic Minor, Phrygian" }
        ];

        const grid = document.getElementById('encyclopediaGrid');
        encyclopediaData.forEach(m => {
            const card = document.createElement('div');
            card.className = 'enc-card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="mode-name">${m.name}</div>
                    <div class="parent-scale">${m.parent}</div>
                </div>
                <div class="info-row"><div class="label">Interval Formula</div><div class="value formula-val">${m.formula}</div></div>
                <div class="info-row"><div class="label">Characteristic Note</div><div class="value">${m.characteristic}</div></div>
                <div class="info-row"><div class="label">Chord Type</div><div class="value">${m.chord}</div></div>
                <div class="info-row"><div class="label">Typical Usage</div><div class="value">${m.usage}</div></div>
                <div class="info-row"><div class="label">Related Modes</div><div class="value" style="color: rgba(255,255,255,0.5);">${m.related}</div></div>
            `;
            grid.appendChild(card);
        });

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { document.getElementById('fadeOverlay').style.opacity = '0'; }, 50);
        });
        function navigateWithFade(url) {
            document.getElementById('fadeOverlay').style.opacity = '1';
            setTimeout(() => { window.location.href = url; }, 400);
        }
    </script>
</body>
</html>
