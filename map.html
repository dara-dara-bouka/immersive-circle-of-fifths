<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>28 Modes Dynamic Network Map</title>
    <style>
        /* index.htmlと完全に共通化された数値型カスタムプロパティ（シームレスオーロラ） */
        @property --x1 { syntax: '<percentage>'; inherits: false; initial-value: 30%; }
        @property --y1 { syntax: '<percentage>'; inherits: false; initial-value: -10%; }
        @property --x2 { syntax: '<percentage>'; inherits: false; initial-value: 85%; }
        @property --y2 { syntax: '<percentage>'; inherits: false; initial-value: 85%; }
        @property --x3 { syntax: '<percentage>'; inherits: false; initial-value: 10%; }
        @property --y3 { syntax: '<percentage>'; inherits: false; initial-value: 50%; }

        :root {
            --bg-color: #080306; 
            --card-bg: rgba(16, 10, 13, 0.85); 
            --text-color: #f0f3f8;
            --border-alpha: rgba(255, 255, 255, 0.07);
            
            --color-M7: #dc2626;
            --color-augM7: #d97706;
            --color-7: #eab308;
            --color-m7b5: #16a34a;
            --color-m7: #2563eb;
            --color-mM7: #7c3aed;
            --color-dim7: #ca228e; 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 30px 20px;
            min-height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow-x: hidden;

            background-image: 
                radial-gradient(circle at var(--x1) var(--y1), #240510 0%, transparent 65%),
                radial-gradient(circle at var(--x2) var(--y2), #12040e 0%, transparent 60%),
                radial-gradient(circle at var(--x3) var(--y3), #17050f 0%, transparent 55%);
            
            animation: seamlessAurora 20s ease-in-out infinite alternate;
        }

        @keyframes seamlessAurora {
            0% { --x1: 20%;  --y1: -10%; --x2: 85%;  --y2: 85%; --x3: 10%;  --y3: 50%; }
            33% { --x1: 75%;  --y1: -20%; --x2: 25%;  --y2: 90%; --x3: 90%;  --y3: 30%; }
            66% { --x1: 50%;  --y1: 105%; --x2: 15%;  --y2: -15%; --x3: 80%;  --y3: 75%; }
            100% { --x1: 15%;  --y1: 95%; --x2: 85%;  --y2: -10%; --x3: 35%;  --y3: 15%; }
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.015'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }

        .nav-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            color: rgba(255, 255, 255, 0.65);
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
            border: 1px solid var(--border-alpha);
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            letter-spacing: 1px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .nav-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-weight: 200;
            letter-spacing: 4px;
            font-size: 26px;
            margin: 0 0 8px 0;
            color: #fff;
            text-align: center;
        }

        p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            margin: 0 0 25px 0;
            text-align: center;
            max-width: 800px;
            line-height: 1.5;
        }

        .controls {
            margin-bottom: 30px;
            display: flex;
            gap: 12px;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 6px;
            border-radius: 30px;
            border: 1px solid var(--border-alpha);
            backdrop-filter: blur(12px);
            z-index: 10;
        }

        .btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.55);
            padding: 8px 20px;
            font-size: 13px;
            font-weight: 400;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn.active {
            background-color: rgba(255, 255, 255, 0.9);
            color: #080a0f;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        .map-container {
            width: 100%;
            max-width: 1400px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .map-scale-shield {
            position: relative;
            overflow: visible;
            display: flex;
        }

        .map-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 1400px;
            height: 1450px;
            user-select: none;
            transform-origin: top left;
        }

        .column-headers {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            text-align: center;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .col-title {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.25);
            border-bottom: 1px dashed rgba(255, 255, 255, 0.05);
            padding-bottom: 12px;
            margin: 0 40px;
        }

        #edge-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .mode-card {
            position: absolute;
            width: 210px;
            background-color: var(--card-bg);
            border: 2px solid #ccc;
            border-radius: 8px;
            padding: 12px 10px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 2;
            cursor: grab;
            transition: left 0.65s cubic-bezier(0.16, 1, 0.3, 1), top 0.65s cubic-bezier(0.16, 1, 0.3, 1), transform 0.2s;
        }
        .mode-card:active {
            cursor: grabbing;
            transform: scale(1.02);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.6);
        }

        .mode-name {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 4px;
            color: #fff;
        }

        .mode-degrees {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 6px;
            font-family: monospace;
        }

        .mode-parent {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* 既存機能：スマホ対応のための2列コンパクトレイアウト凡例構造 */
        .legend {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(8, 3, 6, 0.85);
            border: 1px solid var(--border-alpha);
            padding: 14px;
            border-radius: 10px;
            font-size: 11px;
            z-index: 100;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .legend-title {
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .legend-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.7);
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        @media (max-width: 768px) {
            .legend {
                padding: 8px 10px;
                bottom: 12px;
                left: 12px;
                max-width: 140px;
                background: rgba(8, 3, 6, 0.92);
            }
            .legend-title {
                font-size: 9px;
                margin-bottom: 2px;
            }
            .legend-list {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 4px 8px;
            }
            .legend-item {
                font-size: 9px;
                gap: 4px;
            }
            .legend-color {
                width: 8px;
                height: 8px;
                border-radius: 2px;
            }
        }

        .fade-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #080306;
            z-index: 10000;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.4s ease;
        }
    </style>
</head>
<body>
    <div class="fade-overlay" id="fadeOverlay"></div>
    <button onclick="navigateWithFade('index.html')" class="nav-btn">➔ BACK TO WHEEL</button>

    <h1>28 Modes Network Map</h1>
    <p>Explore links between structural changes. Distance-weighted connection thickness active.</p>

    <div class="controls">
        <button class="btn active" id="btn-grid" onclick="changeLayout('grid')">By Parent Scale (Grid)</button>
        <button class="btn" id="btn-line" onclick="changeLayout('line')">By Brightness (Tonality Level)</button>
    </div>

    <div class="map-container">
        <div class="map-scale-shield" id="mapShield">
            <div class="map-wrapper" id="mapWrapper">
                <div class="column-headers" id="headers">
                    <div class="col-title">MAJOR</div>
                    <div class="col-title">MELODIC MINOR</div>
                    <div class="col-title">HARMONIC MINOR</div>
                    <div class="col-title">HARMONIC MAJOR</div>
                </div>
                <svg id="edge-svg"></svg>
            </div>
        </div>
    </div>

    <div class="legend">
        <div class="legend-title">Chord Colors</div>
        <div class="legend-list">
            <div class="legend-item"><div class="legend-color" style="background:var(--color-M7);"></div>M7</div>
            <div class="legend-item"><div class="legend-color" style="background:var(--color-augM7);"></div>augM7</div>
            <div class="legend-item"><div class="legend-color" style="background:var(--color-7);"></div>7</div>
            <div class="legend-item"><div class="legend-color" style="background:var(--color-m7b5);"></div>m7♭5</div>
            <div class="legend-item"><div class="legend-color" style="background:var(--color-m7);"></div>m7</div>
            <div class="legend-item"><div class="legend-color" style="background:var(--color-mM7);"></div>m(M7)</div>
            <div class="legend-item"><div class="legend-color" style="background:var(--color-dim7);"></div>dim7</div>
        </div>
    </div>

    <script>
        // 🎼 すべての28モードの配置座標・構造配列（1データも漏らさず維持）
        const modesData = [
            { id: "m1_4", name: "Lydian", parent: "Major", degrees: "Ⅰ Ⅱ Ⅲ ♯Ⅳ Ⅴ Ⅵ Ⅶ", semitones: [0, 2, 4, 6, 7, 9, 11], chord: "M7", gridX: 60, gridY: 130, lineLevel: 2 },
            { id: "m1_1", name: "Ionian", parent: "Major", degrees: "Ⅰ Ⅱ Ⅲ Ⅳ Ⅴ Ⅵ Ⅶ", semitones: [0, 2, 4, 5, 7, 9, 11], chord: "M7", gridX: 60, gridY: 250, lineLevel: 3 },
            { id: "m1_5", name: "Mixolydian", parent: "Major", degrees: "Ⅰ Ⅱ Ⅲ Ⅳ Ⅴ Ⅵ ♭Ⅶ", semitones: [0, 2, 4, 5, 7, 9, 10], chord: "7", gridX: 60, gridY: 370, lineLevel: 4 },
            { id: "m1_2", name: "Dorian", parent: "Major", degrees: "Ⅰ Ⅱ ♭Ⅲ Ⅳ Ⅴ Ⅵ ♭Ⅶ", semitones: [0, 2, 3, 5, 7, 9, 10], chord: "m7", gridX: 60, gridY: 490, lineLevel: 5 },
            { id: "m1_6", name: "Aeolian", parent: "Major", degrees: "Ⅰ Ⅱ ♭Ⅲ Ⅳ Ⅴ ♭Ⅵ ♭Ⅶ", semitones: [0, 2, 3, 5, 7, 8, 10], chord: "m7", gridX: 60, gridY: 610, lineLevel: 6 },
            { id: "m1_3", name: "Phrygian", parent: "Major", degrees: "Ⅰ ♭Ⅱ ♭Ⅲ Ⅳ Ⅴ ♭Ⅵ ♭Ⅶ", semitones: [0, 1, 3, 5, 7, 8, 10], chord: "m7", gridX: 60, gridY: 730, lineLevel: 7 },
            { id: "m1_7", name: "Locrian", parent: "Major", degrees: "Ⅰ ♭Ⅱ ♭Ⅲ Ⅳ ♭Ⅴ ♭Ⅵ ♭Ⅶ", semitones: [0, 1, 3, 5, 6, 8, 10], chord: "m7♭5", gridX: 60, gridY: 850, lineLevel: 8 },
            
            { id: "m2_3", name: "Lydian Augmented", parent: "Melodic Minor", degrees: "Ⅰ Ⅱ Ⅲ ♯Ⅳ ♯Ⅴ Ⅵ Ⅶ", semitones: [0, 2, 4, 6, 8, 9, 11], chord: "augM7", gridX: 390, gridY: 40, lineLevel: 1 },
            { id: "m2_4", name: "Lydian Dominant", parent: "Melodic Minor", degrees: "Ⅰ Ⅱ Ⅲ ♯Ⅳ Ⅴ Ⅵ ♭Ⅶ", semitones: [0, 2, 4, 6, 7, 9, 10], chord: "7", gridX: 390, gridY: 160, lineLevel: 2 },
            { id: "m2_1", name: "Melodic Minor", parent: "Melodic Minor", degrees: "Ⅰ Ⅱ ♭Ⅲ Ⅳ Ⅴ Ⅵ Ⅶ", semitones: [0, 2, 3, 5, 7, 9, 11], chord: "m(M7)", gridX: 390, gridY: 280, lineLevel: 3 },
            { id: "m2_5", name: "Mixolydian ♭6", parent: "Melodic Minor", degrees: "Ⅰ Ⅱ Ⅲ Ⅳ Ⅴ ♭Ⅵ ♭Ⅶ", semitones: [0, 2, 4, 5, 7, 8, 10], chord: "7", gridX: 390, gridY: 400, lineLevel: 5 },
            { id: "m2_2", name: "Dorian ♭2", parent: "Melodic Minor", degrees: "Ⅰ ♭Ⅱ ♭Ⅲ Ⅳ Ⅴ Ⅵ ♭Ⅶ", semitones: [0, 1, 3, 5, 7, 9, 10], chord: "m7", gridX: 390, gridY: 520, lineLevel: 6 },
            { id: "m2_6", name: "Locrian ♮2", parent: "Melodic Minor", degrees: "Ⅰ Ⅱ ♭Ⅲ Ⅳ ♭Ⅴ ♭Ⅵ ♭Ⅶ", semitones: [0, 2, 3, 5, 6, 8, 10], chord: "m7♭5", gridX: 390, gridY: 640, lineLevel: 7 },
            { id: "m2_7", name: "Superlocrian", parent: "Melodic Minor", degrees: "Ⅰ ♭Ⅱ ♭Ⅲ ♭Ⅳ ♭Ⅴ ♭Ⅵ ♭Ⅶ", semitones: [0, 1, 3, 4, 6, 8, 10], chord: "m7♭5", gridX: 390, gridY: 760, lineLevel: 9 },
            
            { id: "m3_3", name: "Ionian Augmented", parent: "Harmonic Minor", degrees: "Ⅰ Ⅱ Ⅲ Ⅳ ♯Ⅴ Ⅵ Ⅶ", semitones: [0, 2, 4, 5, 8, 9, 11], chord: "augM7", gridX: 720, gridY: 60, lineLevel: 2 },
            { id: "m3_6", name: "Lydian ♯2", parent: "Harmonic Minor", degrees: "Ⅰ ♯Ⅱ Ⅲ ♯Ⅳ Ⅴ Ⅵ Ⅶ", semitones: [0, 3, 4, 6, 7, 9, 11], chord: "M7", gridX: 720, gridY: 180, lineLevel: 1 },
            { id: "m3_4", name: "Dorian ♯4", parent: "Harmonic Minor", degrees: "Ⅰ Ⅱ ♭Ⅲ ♯Ⅳ Ⅴ Ⅵ ♭Ⅶ", semitones: [0, 2, 3, 6, 7, 9, 10], chord: "m7", gridX: 720, gridY: 300, lineLevel: 4 },
            { id: "m3_1", name: "Harmonic Minor", parent: "Harmonic Minor", degrees: "Ⅰ Ⅱ ♭Ⅲ Ⅳ Ⅴ ♭Ⅵ Ⅶ", semitones: [0, 2, 3, 5, 7, 8, 11], chord: "m(M7)", gridX: 720, gridY: 420, lineLevel: 4 },
            { id: "m3_5", name: "Phrygian Dominant", parent: "Harmonic Minor", degrees: "Ⅰ ♭Ⅱ Ⅲ Ⅳ Ⅴ ♭Ⅵ ♭Ⅶ", semitones: [0, 1, 4, 5, 7, 8, 10], chord: "7", gridX: 720, gridY: 540, lineLevel: 6 },
            { id: "m3_2", name: "Locrian ♮6", parent: "Harmonic Minor", degrees: "Ⅰ ♭Ⅱ ♭Ⅲ Ⅳ ♭Ⅴ Ⅵ ♭Ⅶ", semitones: [0, 1, 3, 5, 6, 9, 10], chord: "m7♭5", gridX: 720, gridY: 660, lineLevel: 8 },
            { id: "m3_7", name: "Ultralocrian", parent: "Harmonic Minor", degrees: "Ⅰ ♭Ⅱ ♭Ⅲ ♭Ⅳ ♭Ⅴ ♭Ⅵ 𝄫Ⅶ", semitones: [0, 1, 3, 4, 6, 8, 9], chord: "dim7", gridX: 720, gridY: 780, lineLevel: 11 },
            
            { id: "m4_6", name: "Lydian Augmented ♯2", parent: "Harmonic Major", degrees: "Ⅰ ♯Ⅱ Ⅲ ♯Ⅳ ♯Ⅴ Ⅵ Ⅶ", semitones: [0, 3, 4, 6, 8, 9, 11], chord: "augM7", gridX: 1050, gridY: 80, lineLevel: 0 },
            { id: "m4_1", name: "Harmonic Major", parent: "Harmonic Major", degrees: "Ⅰ Ⅱ Ⅲ Ⅳ Ⅴ ♭Ⅵ Ⅶ", semitones: [0, 2, 4, 5, 7, 8, 11], chord: "M7", gridX: 1050, gridY: 200, lineLevel: 3 },
            { id: "m4_4", name: "Lydian ♭3", parent: "Harmonic Major", degrees: "Ⅰ Ⅱ ♭Ⅲ ♯Ⅳ Ⅴ Ⅵ Ⅶ", semitones: [0, 2, 3, 6, 7, 9, 11], chord: "m(M7)", gridX: 1050, gridY: 320, lineLevel: 3 },
            { id: "m4_5", name: "Mixolydian ♭2", parent: "Harmonic Major", degrees: "Ⅰ ♭Ⅱ Ⅲ Ⅳ Ⅴ Ⅵ ♭Ⅶ", semitones: [0, 1, 4, 5, 7, 9, 10], chord: "7", gridX: 1050, gridY: 440, lineLevel: 5 },
            { id: "m4_2", name: "Dorian ♭5", parent: "Harmonic Major", degrees: "Ⅰ Ⅱ ♭Ⅲ Ⅳ ♭Ⅴ Ⅵ ♭Ⅶ", semitones: [0, 2, 3, 5, 6, 9, 10], chord: "m7♭5", gridX: 1050, gridY: 560, lineLevel: 8 },
            { id: "m4_3", name: "Phrygian ♭4", parent: "Harmonic Major", degrees: "Ⅰ ♭Ⅱ ♭Ⅲ ♭Ⅳ Ⅴ ♭Ⅵ ♭Ⅶ", semitones: [0, 1, 3, 4, 7, 8, 10], chord: "m7", gridX: 1050, gridY: 680, lineLevel: 7 },
            { id: "m4_7", name: "Locrian 𝄫7", parent: "Harmonic Major", degrees: "Ⅰ ♭Ⅱ ♭Ⅲ Ⅳ ♭Ⅴ ♭Ⅵ 𝄫Ⅶ", semitones: [0, 1, 3, 5, 6, 8, 9], chord: "dim7", gridX: 1050, gridY: 840, lineLevel: 10 }
        ];

        let currentLayoutMode = 'grid';
        const wrapper = document.getElementById("mapWrapper");
        const shield = document.getElementById("mapShield");

        // 📱 既存の高性能レスポンシブ縮小ロジック
        function handleResponsiveScale() {
            const container = document.querySelector('.map-container');
            const windowWidth = container.clientWidth;
            if (windowWidth < 1400) {
                const scale = windowWidth / 1400;
                wrapper.style.transform = `scale(${scale})`;
                shield.style.width = `${1400 * scale}px`;
                shield.style.height = `${1450 * scale}px`;
            } else {
                wrapper.style.transform = 'none';
                shield.style.width = '1400px';
                shield.style.height = '1450px';
            }
        }

        function getColorCode(chord) {
            const colors = { "M7": "#dc2626", "augM7": "#d97706", "7": "#eab308", "m7♭5": "#16a34a", "m7": "#2563eb", "m(M7)": "#7c3aed", "dim7": "#ca228e" };
            return colors[chord] || "#ffffff";
        }

        // モード間のインターバル差異（不一致度＝距離）を計算するコア関数
        function calcNoteDistance(arrayA, arrayB) {
            let difference = 0;
            for(let i=0; i<7; i++) {
                if (arrayA[i] !== arrayB[i]) difference++;
            }
            return difference;
        }

        // 初期構築＆ドラッグドロップ機構の完全展開
        modesData.forEach(mode => {
            const card = document.createElement("div");
            card.className = "mode-card";
            card.id = mode.id;
            card.style.left = `${mode.gridX}px`;
            card.style.top = `${mode.gridY}px`;
            card.style.borderColor = getColorCode(mode.chord);
            card.innerHTML = `<div class="mode-name">${mode.name}</div><div class="mode-degrees">${mode.degrees}</div><div class="mode-parent">${mode.parent}</div>`;
            wrapper.appendChild(card);

            let isDragging = false;
            let startX, startY, initLeft, initTop;

            const dragStart = (e) => {
                const pageX = e.pageX || e.touches[0].pageX;
                const pageY = e.pageY || e.touches[0].pageY;
                isDragging = true;
                card.style.transition = 'none';
                card.style.zIndex = 1000;
                startX = pageX;
                startY = pageY;
                initLeft = card.offsetLeft;
                initTop = card.offsetTop;

                document.addEventListener('mousemove', dragMove);
                document.addEventListener('mouseup', dragEnd);
                document.addEventListener('touchmove', dragMove, { passive: false });
                document.addEventListener('touchend', dragEnd);
            };

            const dragMove = (e) => {
                if (!isDragging) return;
                if (e.cancelable) e.preventDefault();
                const pageX = e.pageX || e.touches[0].pageX;
                const pageY = e.pageY || e.touches[0].pageY;

                const container = document.querySelector('.map-container');
                const scale = container.clientWidth < 1400 ? container.clientWidth / 1400 : 1;

                card.style.left = `${initLeft + (pageX - startX) / scale}px`;
                card.style.top = `${initTop + (pageY - startY) / scale}px`;
                drawEdges(); // 移動中に線をリアルタイム再描画
            };

            const dragEnd = () => {
                if (!isDragging) return;
                isDragging = false;
                card.style.zIndex = 2;
                card.style.transition = 'left 0.65s cubic-bezier(0.16, 1, 0.3, 1), top 0.65s cubic-bezier(0.16, 1, 0.3, 1), transform 0.2s';
                
                document.removeEventListener('mousemove', dragMove);
                document.removeEventListener('mouseup', dragEnd);
                document.removeEventListener('touchmove', dragMove);
                document.removeEventListener('touchend', dragEnd);
            };

            card.addEventListener('mousedown', dragStart);
            card.addEventListener('touchstart', dragStart, { passive: true });
        });

        // 🛠️ 新機能：距離の近さに応じて太さと明るさを動的に変化させるエッジ描画
        function drawEdges() {
            const svg = document.getElementById("edge-svg");
            svg.innerHTML = "";

            for (let i = 0; i < modesData.length; i++) {
                for (let j = i + 1; j < modesData.length; j++) {
                    const modeA = modesData[i];
                    const modeB = modesData[j];
                    const distance = calcNoteDistance(modeA.semitones, modeB.semitones);

                    // 1つまたは2つの音だけが変化している関係性をリンク（近接ネットワーク）
                    if (distance <= 2) {
                        const cardA = document.getElementById(modeA.id);
                        const cardB = document.getElementById(modeB.id);

                        const x1 = cardA.offsetLeft + 105;
                        const y1 = cardA.offsetTop + 27;
                        const x2 = cardB.offsetLeft + 105;
                        const y2 = cardB.offsetTop + 27;

                        // 距離が非常に近い(1)ほど太く眩しく輝き、遠い(2)ほど細く控えめになる
                        const strokeWidth = (distance === 1) ? "3.2" : "1.2";
                        const opacity = (distance === 1) ? "0.9" : "0.28";

                        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                        line.setAttribute("x1", x1); line.setAttribute("y1", y1);
                        line.setAttribute("x2", x2); line.setAttribute("y2", y2);
                        line.setAttribute("stroke", getColorCode(modeA.chord));
                        line.setAttribute("stroke-width", strokeWidth);
                        line.setAttribute("opacity", opacity);

                        // コードファミリーが異なる場合は破線にして視覚的に構造分離
                        if (modeA.chord !== modeB.chord) {
                            line.setAttribute("stroke-dasharray", "4,4");
                        }

                        svg.appendChild(line);
                    }
                }
            }
        }

        const systemWeights = { "Major": 1, "Melodic Minor": 2, "Harmonic Minor": 3, "Harmonic Major": 4 };
        function getLineCoordinates(mode) {
            const levelGroup = modesData.filter(m => m.lineLevel === mode.lineLevel).sort((a, b) => systemWeights[a.parent] - systemWeights[b.parent]);
            const idx = levelGroup.findIndex(m => m.id === mode.id);
            const count = levelGroup.length;
            const y = 90 + (mode.lineLevel * 105);
            const x = 700 - ((count - 1) * 250 / 2) - 105 + (idx * 250);
            return { x, y };
        }

        function changeLayout(type) {
            currentLayoutMode = type;
            document.getElementById("btn-grid").classList.toggle("active", type === 'grid');
            document.getElementById("btn-line").classList.toggle("active", type === 'line');
            document.getElementById("headers").style.opacity = (type === 'grid') ? "1" : "0";

            modesData.forEach(mode => {
                const card = document.getElementById(mode.id);
                const targetCoords = (type === 'grid') ? { x: mode.gridX, y: mode.gridY } : getLineCoordinates(mode);
                card.style.left = `${targetCoords.x}px`;
                card.style.top = `${targetCoords.y}px`;
            });

            let startTime = null;
            function animateLines(timestamp) {
                if (!startTime) startTime = timestamp;
                drawEdges();
                if (timestamp - startTime < 650) {
                    requestAnimationFrame(animateLines);
                } else {
                    drawEdges(); 
                }
            }
            requestAnimationFrame(animateLines);
        }

        document.querySelectorAll('.mode-card').forEach(card => {
            card.addEventListener('transitionend', drawEdges);
        });

        window.addEventListener("load", () => {
            handleResponsiveScale();
            drawEdges();
        });
        window.addEventListener("resize", () => {
            handleResponsiveScale();
            drawEdges();
        });

        /* 🎬 既存機能：フェードイン・アウト用のスクリプト */
        window.addEventListener('DOMContentLoaded', () => {
            const overlay = document.getElementById('fadeOverlay');
            setTimeout(() => { overlay.style.opacity = '0'; }, 50);
        });

        function navigateWithFade(url) {
            const overlay = document.getElementById('fadeOverlay');
            overlay.style.opacity = '1';
            setTimeout(() => { window.location.href = url; }, 400);
        }
    </script>
</body>
</html>
