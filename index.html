<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immersive Circle of Fifths</title>
    
    <meta property=\"og:url\" content=\"https://dara-dara-bouka.github.io/immersive-circle-of-fifths/\">
    <meta property=\"og:type\" content=\"website\">
    <meta property=\"og:title\" content=\"Immersive Circle of Fifths\">
    <meta property=\"og:description\" content=\"五度圏（Circle of Fifths）を視覚と聴覚で直感的に理解する、インタラクティブな音楽理論ツール。ハーモニック・メジャー等の各種モードやダイアトニックコードに完全対応。\">
    <meta property=\"og:image\" content=\"https://dara-dara-bouka.github.io/immersive-circle-of-fifths/og-image.png\">
    <meta name=\"twitter:card\" content=\"summary_large_image\">

    <style>
        /* 最新のCSS機能で座標を数値として定義 */
        @property --x1 { syntax: '<percentage>'; inherits: false; initial-value: 30%; }
        @property --y1 { syntax: '<percentage>'; inherits: false; initial-value: -10%; }
        @property --x2 { syntax: '<percentage>'; inherits: false; initial-value: 85%; }
        @property --y2 { syntax: '<percentage>'; inherits: false; initial-value: 85%; }
        @property --x3 { syntax: '<percentage>'; inherits: false; initial-value: 10%; }
        @property --y3 { syntax: '<percentage>'; inherits: false; initial-value: 50%; }

        :root {
            --bg-color: #080306; 
            --card-bg: rgba(16, 10, 13, 0.65); 
            --text-color: #f0f3f8;
            --border-alpha: rgba(255, 255, 255, 0.07);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow-x: hidden;

            background-image: 
                radial-gradient(circle at var(--x1) var(--y1), #240510 0%, transparent 65%),
                radial-gradient(circle at var(--x2) var(--y2), #12040e 0%, transparent 60%),
                radial-gradient(circle at var(--x3) var(--y3), #17050f 0%, transparent 55%);
            
            animation: seamlessAurora 20s ease-in-out infinite alternate;
        }

        @keyframes seamlessAurora {
            0% { --x1: 20%;  --y1: -10%; --x2: 85%;  --y2: 85%; --x3: 10%;  --y3: 50%; }
            33% { --x1: 75%;  --y1: -20%; --x2: 25%;  --y2: 90%; --x3: 90%;  --y3: 30%; }
            66% { --x1: 50%;  --y1: 105%; --x2: 15%;  --y2: -15%; --x3: 80%;  --y3: 75%; }
            100% { --x1: 15%;  --y1: 95%; --x2: 85%;  --y2: -10%; --x3: 35%;  --y3: 15%; }
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.015'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }

        h1, .subtitle, .selector-container, .wheel-outer-container, .info-panel, .display-grid, .nav-btn, #enharmonic-toggle {
            position: relative;
            z-index: 2;
        }

        h1 {
            font-weight: 200;
            letter-spacing: 4px;
            font-size: 32px;
            margin: 0 0 6px 0;
            color: #ffffff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.6);
            text-align: center;
        }

        .subtitle {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin: 0 0 30px 0;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .nav-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            color: rgba(255, 255, 255, 0.65);
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
            border: 1px solid var(--border-alpha);
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            letter-spacing: 1px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }
        .nav-btn:hover {
            color: #ffffff;
            background-color: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.4);
        }

        .selector-container {
            display: flex;
            gap: 10px;
            margin-bottom: 35px;
            background: rgba(255, 255, 255, 0.02);
            padding: 6px;
            border-radius: 30px;
            border: 1px solid var(--border-alpha);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .scale-btn {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.6);
            padding: 8px 18px;
            font-size: 12.5px;
            font-weight: 400;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .scale-btn:hover {
            color: #ffffff;
            background-color: rgba(255, 255, 255, 0.04);
        }
        .scale-btn.active {
            background-color: rgba(255, 255, 255, 0.92);
            color: #080a0f;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        /* 📱 五度圏ホイールをスマホ幅に合わせて自動縮小させるための親コンテナ */
        .wheel-outer-container {
            width: 100%;
            max-width: 580px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
        }

        .wheel-container {
            position: relative;
            width: 580px;
            height: 580px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-origin: center center;
        }

        #fifths-wheel {
            width: 100%;
            height: 100%;
            overflow: visible;
            touch-action: min-diagonal; /* スマホでのスクロール操作と干渉しにくくする */
        }

        path.outer-note-sector {
            cursor: pointer;
            transition: fill 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        path.inner-quality-sector {
            transition: fill 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .center-display {
            position: absolute;
            width: 170px;
            height: 170px;
            background: rgba(10, 5, 8, 0.85);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.04);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 10px 30px rgba(0,0,0,0.6);
            pointer-events: none;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .center-root {
            font-size: 40px;
            font-weight: 200;
            color: #ffffff;
            line-height: 1;
            margin-bottom: 2px;
            letter-spacing: -1px;
        }
        .center-quality {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.4);
        }

        #enharmonic-toggle {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-alpha);
            color: rgba(255,255,255,0.5);
            padding: 5px 12px;
            font-size: 10px;
            border-radius: 15px;
            cursor: pointer;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            display: none;
        }
        #enharmonic-toggle:hover {
            color: #fff;
            border-color: rgba(255,255,255,0.2);
        }

        .info-panel {
            min-height: 20px;
            font-size: 13.5px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 35px;
            text-align: center;
            max-width: 600px;
            letter-spacing: 0.2px;
            transition: color 0.3s;
        }

        .display-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            width: 100%;
            max-width: 950px;
            box-sizing: border-box;
            padding: 0 10px;
        }

        .panel-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.3);
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 6px;
            display: none;
        }

        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .item-card {
            background: var(--card-bg);
            border: 1px solid var(--border-alpha);
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            animation: cardAppear 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .item-card:hover {
            border-color: rgba(255,255,255,0.15);
            transform: translateY(-2px);
            background: rgba(24, 15, 20, 0.8);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-left { display: flex; flex-direction: column; gap: 2px; }
        .card-label { font-size: 14px; font-weight: 500; color: #ffffff; }
        .card-sub { font-size: 10px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.5px; }
        .card-right { font-size: 13.5px; font-weight: 400; color: rgba(255,255,255,0.85); letter-spacing: 0.5px; }

        text.note-label {
            font-size: 21px;
            font-weight: 300;
            fill: #ffffff;
            pointer-events: none;
            user-select: none;
            transition: opacity 0.3s, fill 0.3s;
        }
        
        text.dimmed-text {
            opacity: 0.25;
        }

        .quality-label {
            font-size: 9px;
            font-weight: 600;
            fill: rgba(255, 255, 255, 0.4);
            pointer-events: none;
            user-select: none;
            opacity: 0;
            transition: opacity 0.4s;
        }
        .quality-label.show {
            opacity: 1;
        }

        /* 🎬 ページ遷移用のフェードカーテン */
        .fade-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #080306;
            z-index: 10000;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        /* ==========================================================================
           📱 レスポンシブ用メディアクエリ（スマホ・タブレット対応）
           ========================================================================== */
        @media (max-width: 768px) {
            body { padding: 20px 10px; }
            h1 { font-size: 24px; letter-spacing: 2px; margin-top: 45px; }
            .subtitle { font-size: 11px; margin-bottom: 20px; }
            
            .nav-btn { top: 10px; right: 10px; padding: 6px 12px; font-size: 10px; }
            .selector-container { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 6px; border-radius: 16px; width: 100%; max-width: 340px; box-sizing: border-box; }
            .scale-btn { padding: 8px 10px; font-size: 11px; border-radius: 10px; text-align: center; }

            /* 画面幅に応じてホイールの大きさをCSSスケールで自動縮小 */
            .wheel-container {
                width: 100%;
                height: auto;
                aspect-ratio: 1 / 1;
                max-width: 420px;
                max-height: 420px;
            }

            .info-panel { font-size: 12px; margin-bottom: 20px; padding: 0 15px; }
            #enharmonic-toggle { margin-bottom: 20px; }

            /* モードとコードの二段組みをスマホ用に縦一列に変更 */
            .display-grid { grid-template-columns: 1fr; gap: 20px; }
            .item-card { padding: 10px 14px; }
            .card-label { font-size: 13px; }
            .card-right { font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="fade-overlay" id="fadeOverlay"></div>

    <button onclick="navigateWithFade('map.html')" class="nav-btn">➔ VIEW NETWORK MAP</button>

    <h1>Immersive Circle of Fifths</h1>
    <div class="subtitle">Interactive Music Theory Blueprint</div>

    <div class="selector-container">
        <button class="scale-btn active" onclick="selectParentScale('major')">Major</button>
        <button class="scale-btn" onclick="selectParentScale('melodic_minor')">Melodic Minor</button>
        <button class="scale-btn" onclick="selectParentScale('harmonic_minor')">Harmonic Minor</button>
        <button class="scale-btn" onclick="selectParentScale('harmonic_major')">Harmonic Major</button>
    </div>

    <div class="wheel-outer-container">
        <div class="wheel-container">
            <svg id="fifths-wheel" viewBox="0 0 580 580">
                <defs>
                    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="#240e1a" stop-opacity="1"/>
                        <stop offset="70%" stop-color="#0a0508" stop-opacity="0.5"/>
                        <stop offset="100%" stop-color="#080306" stop-opacity="0"/>
                    </radialGradient>
                </defs>
                <circle cx="290" cy="290" r="260" fill="url(#centerGlow)" pointer-events="none" />
                <g id="wheel-content"></g>
            </svg>
            <div class="center-display">
                <div class="center-root" id="display-root">-</div>
                <div class="center-quality" id="display-quality">Select note</div>
            </div>
        </div>
    </div>

    <button id="enharmonic-toggle" onclick="toggleEnharmonic()">Switch to G♭ / E♭m</button>

    <div class="info-panel" id="info-text">
        Select a Parent Scale, then click a note on the wheel to begin.
    </div>

    <div class="display-grid">
        <div>
            <div class="panel-title" id="modes-title">7 Parallel Modes</div>
            <div class="cards-container" id="modes-area"></div>
        </div>
        <div>
            <div class="panel-title" id="chords-title">Diatonic Seventh Chords</div>
            <div class="cards-container" id="chord-area"></div>
        </div>
    </div>

    <script>
        // 🎼 音楽理論データ＆システムコアロジック
        const noteNamesDefault = ["C", "G", "D", "A", "E", "B", "F♯", "C♯", "A♭", "E♭", "B♭", "F"];
        const noteNamesAlt     = ["C", "G", "D", "A", "E", "B", "G♭", "D♯", "G♯", "D♭", "B♭", "F"]; 
        let currentNoteNames = [...noteNamesDefault];
        let useAltNames = false;

        const parentScales = {
            major: {
                name: "Major Scale",
                qualities: ["maj", "min", "min", "maj", "dom", "min", "dim"],
                colors: ["#dc2626", "#2563eb", "#2563eb", "#dc2626", "#eab308", "#2563eb", "#16a34a"],
                modes: [
                    { name: "Ionian", steps: "Ⅰ Ⅱ Ⅲ Ⅳ Ⅴ Ⅵ Ⅶ", intervals: [0,2,4,5,7,9,11], suffix: "M7" },
                    { name: "Dorian", steps: "Ⅰ Ⅱ ♭Ⅲ Ⅳ Ⅴ Ⅵ ♭Ⅶ", intervals: [0,2,3,5,7,9,10], suffix: "m7" },
                    { name: "Phrygian", steps: "Ⅰ ♭Ⅱ ♭Ⅲ Ⅳ Ⅴ ♭Ⅵ ♭Ⅶ", intervals: [0,1,3,5,7,8,10], suffix: "m7" },
                    { name: "Lydian", steps: "Ⅰ Ⅱ Ⅲ ♯Ⅳ Ⅴ Ⅵ Ⅶ", intervals: [0,2,4,6,7,9,11], suffix: "M7" },
                    { name: "Mixolydian", steps: "Ⅰ Ⅱ Ⅲ Ⅳ Ⅴ Ⅵ ♭Ⅶ", intervals: [0,2,4,5,7,9,10], suffix: "7" },
                    { name: "Aeolian", steps: "Ⅰ Ⅱ ♭Ⅲ Ⅳ Ⅴ ♭Ⅵ ♭Ⅶ", intervals: [0,2,3,5,7,8,10], suffix: "m7" },
                    { name: "Locrian", steps: "Ⅰ ♭Ⅱ ♭Ⅲ Ⅳ ♭Ⅴ ♭Ⅵ ♭Ⅶ", intervals: [0,1,3,5,6,8,10], suffix: "m7♭5" }
                ]
            },
            melodic_minor: {
                name: "Melodic Minor",
                qualities: ["m(M7)", "min", "aug", "dom", "dom", "dim", "dim"],
                colors: ["#7c3aed", "#2563eb", "#d97706", "#eab308", "#eab308", "#16a34a", "#16a34a"],
                modes: [
                    { name: "Melodic Minor", steps: "Ⅰ Ⅱ ♭Ⅲ Ⅳ Ⅴ Ⅵ Ⅶ", intervals: [0,2,3,5,7,9,11], suffix: "m(M7)" },
                    { name: "Dorian ♭2", steps: "Ⅰ ♭Ⅱ ♭Ⅲ Ⅳ Ⅴ Ⅵ ♭Ⅶ", intervals: [0,1,3,5,7,9,10], suffix: "m7" },
                    { name: "Lydian Augmented", steps: "Ⅰ Ⅱ Ⅲ ♯Ⅳ ♯Ⅴ Ⅵ Ⅶ", intervals: [0,2,4,6,8,9,11], suffix: "augM7" },
                    { name: "Lydian Dominant", steps: "Ⅰ Ⅱ Ⅲ ♯Ⅳ Ⅴ Ⅵ ♭Ⅶ", intervals: [0,2,4,6,7,9,10], suffix: "7" },
                    { name: "Mixolydian ♭6", steps: "Ⅰ Ⅱ Ⅲ Ⅳ Ⅴ ♭Ⅵ ♭Ⅶ", intervals: [0,2,4,5,7,8,10], suffix: "7" },
                    { name: "Locrian ♮2", steps: "Ⅰ Ⅱ ♭Ⅲ Ⅳ ♭Ⅴ ♭Ⅵ ♭Ⅶ", intervals: [0,2,3,5,6,8,10], suffix: "m7♭5" },
                    { name: "Superlocrian (Altered)", steps: "Ⅰ ♭Ⅱ ♭Ⅲ ♭Ⅳ ♭Ⅴ ♭Ⅵ ♭Ⅶ", intervals: [0,1,3,4,6,8,10], suffix: "m7♭5" }
                ]
            },
            harmonic_minor: {
                name: "Harmonic Minor",
                qualities: ["m(M7)", "dim", "aug", "min", "dom", "maj", "dim"],
                colors: ["#7c3aed", "#16a34a", "#d97706", "#2563eb", "#eab308", "#dc2626", "#ca228e"],
                modes: [
                    { name: "Harmonic Minor", steps: "Ⅰ Ⅱ ♭Ⅲ Ⅳ Ⅴ ♭Ⅵ Ⅶ", intervals: [0,2,3,5,7,8,11], suffix: "m(M7)" },
                    { name: "Locrian ♮6", steps: "Ⅰ ♭Ⅱ ♭Ⅲ Ⅳ ♭Ⅴ Ⅵ ♭Ⅶ", intervals: [0,1,3,5,6,9,10], suffix: "m7♭5" },
                    { name: "Ionian Augmented", steps: "Ⅰ Ⅱ Ⅲ Ⅳ ♯Ⅴ Ⅵ Ⅶ", intervals: [0,2,4,5,8,9,11], suffix: "augM7" },
                    { name: "Dorian ♯4", steps: "Ⅰ Ⅱ ♭Ⅲ ♯Ⅳ Ⅴ Ⅵ ♭Ⅶ", intervals: [0,2,3,6,7,9,10], suffix: "m7" },
                    { name: "Phrygian Dominant", steps: "Ⅰ ♭Ⅱ Ⅲ Ⅳ Ⅴ ♭Ⅵ ♭Ⅶ", intervals: [0,1,4,5,7,8,10], suffix: "7" },
                    { name: "Lydian ♯2", steps: "Ⅰ ♯Ⅱ Ⅲ ♯Ⅳ Ⅴ Ⅵ Ⅶ", intervals: [0,3,4,6,7,9,11], suffix: "M7" },
                    { name: "Ultralocrian", steps: "Ⅰ ♭Ⅱ ♭Ⅲ ♭Ⅳ ♭Ⅴ ♭Ⅵ 𝄫Ⅶ", intervals: [0,1,3,4,6,8,9], suffix: "dim7" }
                ]
            },
            harmonic_major: {
                name: "Harmonic Major",
                qualities: ["maj", "dim", "min", "m(M7)", "dom", "aug", "dim"],
                colors: ["#dc2626", "#16a34a", "#2563eb", "#7c3aed", "#eab308", "#d97706", "#ca228e"],
                modes: [
                    { name: "Harmonic Major", steps: "Ⅰ Ⅱ Ⅲ Ⅳ Ⅴ ♭Ⅵ Ⅶ", intervals: [0,2,4,5,7,8,11], suffix: "M7" },
                    { name: "Dorian ♭5", steps: "Ⅰ Ⅱ ♭Ⅲ Ⅳ ♭Ⅴ Ⅵ ♭Ⅶ", intervals: [0,2,3,5,6,9,10], suffix: "m7♭5" },
                    { name: "Phrygian ♭4", steps: "Ⅰ ♭Ⅱ ♭Ⅲ ♭Ⅳ Ⅴ ♭Ⅵ ♭Ⅶ", intervals: [0,1,3,4,7,8,10], suffix: "m7" },
                    { name: "Lydian ♭3", steps: "Ⅰ Ⅱ ♭Ⅲ ♯Ⅳ Ⅴ Ⅵ Ⅶ", intervals: [0,2,3,6,7,9,11], suffix: "m(M7)" },
                    { name: "Mixolydian ♭2", steps: "Ⅰ ♭Ⅱ Ⅲ Ⅳ Ⅴ Ⅵ ♭Ⅶ", intervals: [0,1,4,5,7,9,10], suffix: "7" },
                    { name: "Lydian Augmented ♯2", steps: "Ⅰ ♯Ⅱ Ⅲ ♯Ⅳ ♯Ⅴ Ⅵ Ⅶ", intervals: [0,3,4,6,8,9,11], suffix: "augM7" },
                    { name: "Locrian 𝄫7", steps: "Ⅰ ♭Ⅱ ♭Ⅲ Ⅳ ♭Ⅴ ♭Ⅵ 𝄫Ⅶ", intervals: [0,1,3,5,6,8,9], suffix: "dim7" }
                ]
            }
        };

        let currentScaleKey = "major";
        let currentSelectedRoot = null;

        const semitoneMap = [0, 7, 2, 9, 4, 11, 6, 1, 8, 3, 10, 5]; 
        const intervalNames = ["1st", "♭2nd", "2nd", "♭3rd", "3rd", "4th", "♯4th/♭5th", "5th", "♭6th", "6th", "♭7th", "7th"];

        function getNoteName(index) {
            return currentNoteNames[(index + 12) % 12];
        }

        function getNoteBySemitoneOffset(rootIdx, semitoneOffset) {
            const rootSemitone = semitoneMap[rootIdx];
            const targetSemitone = (rootSemitone + semitoneOffset) % 12;
            const targetWheelIdx = semitoneMap.indexOf(targetSemitone);
            return getNoteName(targetWheelIdx);
        }

        const wheelContent = document.getElementById("wheel-content");
        const displayRoot = document.getElementById("display-root");
        const displayQuality = document.getElementById("display-quality");
        const info = document.getElementById("info-text");
        const enharmonicToggle = document.getElementById("enharmonic-toggle");
        
        const modesTitle = document.getElementById("modes-title");
        const chordsTitle = document.getElementById("chords-title");
        const modesArea = document.getElementById("modes-area");
        const chordArea = document.getElementById("chord-area");

        // SVGの扇形（セクター）パスを生成する
        function createSectorPath(cx, cy, rIn, rOut, startAngle, endAngle) {
            const rad = Math.PI / 180;
            const x1_in = cx + rIn * Math.cos(startAngle * rad);
            const y1_in = cy + rIn * Math.sin(startAngle * rad);
            const x2_in = cx + rIn * Math.cos(endAngle * rad);
            const y2_in = cy + rIn * Math.sin(endAngle * rad);
            const x1_out = cx + rOut * Math.cos(startAngle * rad);
            const y1_out = cy + rOut * Math.sin(startAngle * rad);
            const x2_out = cx + rOut * Math.cos(endAngle * rad);
            const y2_out = cy + rOut * Math.sin(endAngle * rad);
            
            return `M ${x1_in} ${y1_in} 
                    L ${x1_out} ${y1_out} 
                    A ${rOut} ${rOut} 0 0 1 ${x2_out} ${y2_out} 
                    L ${x2_in} ${y2_in} 
                    A ${rIn} ${rIn} 0 0 0 ${x1_in} ${y1_in} Z`;
        }

        // ホイールの土台と12の区画を生成
        function initWheel() {
            wheelContent.innerHTML = "";
            const cx = 290, cy = 290;
            
            for (let i = 0; i < 12; i++) {
                const angleOffset = -90 - 15; 
                const startAngle = angleOffset + (i * 30);
                const endAngle = startAngle + 30;
                const midAngle = startAngle + 15;
                const rad = Math.PI / 180;

                // 1. 内側のコードクオリティ表示用セクター
                const innerPathStr = createSectorPath(cx, cy, 140, 195, startAngle, endAngle);
                const innerSector = document.createElementNS("http://www.w3.org/2000/svg", "path");
                innerSector.setAttribute("d", innerPathStr);
                innerSector.setAttribute("class", "inner-quality-sector");
                innerSector.setAttribute("id", `inner-sec-${i}`);
                innerSector.style.fill = "#111520";
                wheelContent.appendChild(innerSector);

                // 2. 外側のルート音クリック用セクター
                const outerPathStr = createSectorPath(cx, cy, 195, 270, startAngle, endAngle);
                const outerSector = document.createElementNS("http://www.w3.org/2000/svg", "path");
                outerSector.setAttribute("d", outerPathStr);
                outerSector.setAttribute("class", "outer-note-sector");
                outerSector.setAttribute("id", `outer-sec-${i}`);
                outerSector.dataset.index = i;
                outerSector.style.fill = "rgba(255, 255, 255, 0.02)";
                outerSector.style.stroke = "rgba(255, 255, 255, 0.04)";
                outerSector.style.strokeWidth = "1";

                outerSector.addEventListener("click", () => onNoteClick(i));
                wheelContent.appendChild(outerSector);

                // 3. ルート音のテキストラベル
                const textR = 232;
                const tx = cx + textR * Math.cos(midAngle * rad);
                const ty = cy + textR * Math.sin(midAngle * rad) + 7;
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", tx);
                text.setAttribute("y", ty);
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("class", "note-label");
                text.setAttribute("id", `note-text-${i}`);
                text.textContent = getNoteName(i);
                wheelContent.appendChild(text);

                // 4. 内側のクオリティテキストラベル
                const qualR = 168;
                const qx = cx + qualR * Math.cos(midAngle * rad);
                const qy = cy + qualR * Math.sin(midAngle * rad) + 4;
                const qtext = document.createElementNS("http://www.w3.org/2000/svg", "text");
                qtext.setAttribute("x", qx);
                qtext.setAttribute("y", qy);
                qtext.setAttribute("text-anchor", "middle");
                qtext.setAttribute("class", "quality-label");
                qtext.setAttribute("id", `quality-text-${i}`);
                wheelContent.appendChild(qtext);
            }
        }

        function selectParentScale(key) {
            currentScaleKey = key;
            document.querySelectorAll(".scale-btn").forEach(btn => btn.classList.remove("active"));
            event.target.classList.remove("active"); 
            // 呼び出し元の特定を安全にするためクラスを一括制御
            const targetBtn = Array.from(document.querySelectorAll(".scale-btn")).find(b => b.getAttribute('onclick').includes(key));
            if(targetBtn) targetBtn.classList.add("active");

            displayQuality.textContent = parentScales[key].name;
            
            if (currentSelectedRoot !== null) {
                renderModalUniverse(currentSelectedRoot);
            } else {
                resetWheelColors();
            }
        }

        function toggleEnharmonic() {
            useAltNames = !useAltNames;
            currentNoteNames = useAltNames ? [...noteNamesAlt] : [...noteNamesDefault];
            enharmonicToggle.textContent = useAltNames ? "Switch to F♯ / D♯m" : "Switch to G♭ / E♭m";
            
            for (let i = 0; i < 12; i++) {
                document.getElementById(`note-text-${i}`).textContent = getNoteName(i);
            }
            if (currentSelectedRoot !== null) {
                onNoteClick(currentSelectedRoot);
            }
        }

        function resetWheelColors() {
            document.querySelectorAll('path.outer-note-sector').forEach(p => {
                p.style.fill = "rgba(255, 255, 255, 0.02)";
                delete p.dataset.defaultFill;
            });
            document.querySelectorAll('path.inner-quality-sector').forEach(p => p.style.fill = "#111520");
            document.querySelectorAll('text.note-label').forEach(t => t.classList.remove('dimmed-text'));
            document.querySelectorAll('.quality-label').forEach(q => { q.classList.remove('show'); q.textContent = ""; });
        }

        function onNoteClick(index) {
            currentSelectedRoot = index;
            
            if (index === 6 || index === 7 || index === 8 || index === 9) {
                enharmonicToggle.style.display = "inline-block";
            } else {
                enharmonicToggle.style.display = "none";
            }

            renderModalUniverse(index);
        }

        // クリックされたノートを中心に、モーダル宇宙（ダイアトニック関係）を再描画
        function renderModalUniverse(rootIdx) {
            resetWheelColors();
            
            const scaleInfo = parentScales[currentScaleKey];
            displayRoot.textContent = getNoteName(rootIdx);
            displayQuality.textContent = scaleInfo.name;

            info.style.color = "#ffffff";
            info.textContent = `Analyzing ${getNoteName(rootIdx)} ${scaleInfo.name}. Colored areas show the structural container.`;

            // 五度圏上の対応関係に色を塗るステップ（Major基準のステップ順序: I, V, II, VI, III, VII, IV）
            const relativeOffsets = [0, 1, 2, 3, 4, 5, -1]; 
            const activeIndices = [];

            relativeOffsets.forEach((offset, orderIdx) => {
                const targetIdx = (rootIdx + offset + 12) % 12;
                activeIndices.push(targetIdx);

                const qualityStr = scaleInfo.qualities[orderIdx];
                const colorCode = scaleInfo.colors[orderIdx];

                const outerSec = document.getElementById(`outer-sec-${targetIdx}`);
                const innerSec = document.getElementById(`inner-sec-${targetIdx}`);
                const qText = document.getElementById(`quality-text-${targetIdx}`);

                // スタイルを鮮やかに上書き
                outerSec.style.fill = colorCode + "18"; 
                outerSec.dataset.defaultFill = colorCode + "18"; 
                innerSec.style.fill = colorCode + "25";  

                qText.textContent = qualityStr;
                qText.classList.add("show");
            });

            // 選ばれていないトーンをうっすら暗転させて主役を引き立てる
            for (let i = 0; i < 12; i++) {
                if (!activeIndices.includes(i)) {
                    document.getElementById(`note-text-${i}`).classList.add('dimmed-text');
                }
            }

            // 下部のタイトルを表示
            modesTitle.style.display = "block";
            chordsTitle.style.display = "block";

            // 1. パラレルモードのカード群を生成
            modesArea.innerHTML = "";
            scaleInfo.modes.forEach((mode, idx) => {
                const card = document.createElement("div");
                card.className = "item-card";
                card.style.animationDelay = `${idx * 0.04}s`;
                card.style.borderLeft = `3px solid ${scaleInfo.colors[idx]}`;

                // モードの構成音群を計算
                const noteList = mode.intervals.map(offset => getNoteBySemitoneOffset(rootIdx, offset)).join("  ");

                card.innerHTML = `
                    <div class="card-left">
                        <div class="card-label">${getNoteName(rootIdx)} ${mode.name}</div>
                        <div class="card-sub">${mode.steps}</div>
                    </div>
                    <div class="card-right">${noteList}</div>
                `;
                modesArea.appendChild(card);
            });

            // 2. ダイアトニック・セブンスコードのカード群を生成
            chordArea.innerHTML = "";
            relativeOffsets.forEach((offset, orderIdx) => {
                const targetIdx = (rootIdx + offset + 12) % 12;
                const chordRootName = getNoteName(targetIdx);
                const modeConfig = scaleInfo.modes[orderIdx];
                const colorCode = scaleInfo.colors[orderIdx];

                const card = document.createElement("div");
                card.className = "item-card";
                card.style.animationDelay = `${orderIdx * 0.04}s`;
                card.style.borderLeft = `3px solid ${colorCode}`;

                // コード構成音（ルートから1, 3, 5, 7番目のインターバル）の抽出
                const c1 = getNoteBySemitoneOffset(targetIdx, modeConfig.intervals[0]);
                const c3 = getNoteBySemitoneOffset(targetIdx, modeConfig.intervals[2]);
                const c5 = getNoteBySemitoneOffset(targetIdx, modeConfig.intervals[4]);
                const c7 = getNoteBySemitoneOffset(targetIdx, modeConfig.intervals[6]);

                const romanNumerals = ["Ⅰ", "Ⅴ", "Ⅱ", "Ⅵ", "Ⅲ", "Ⅶ", "Ⅳ"];
                const degreeLabel = romanNumerals[orderIdx];

                card.innerHTML = `
                    <div class="card-left">
                        <div class="card-label">${chordRootName}${modeConfig.suffix}</div>
                        <div class="card-sub">Scale Degree: ${degreeLabel} (${modeConfig.name} Base)</div>
                    </div>
                    <div class="card-right">${c1}  -  ${c3}  -  ${c5}  -  ${c7}</div>
                `;
                chordArea.appendChild(card);
            });
        }

        // 初期起動
        initWheel();

        // 📱 画面の背景クリック等で選択を解除できるようにする（使いやすさの向上）
        document.body.addEventListener('click', (e) => {
            if (!e.target.closest('.outer-note-sector') && !e.target.closest('.selector-container') && !e.target.closest('#enharmonic-toggle') && !e.target.closest('.nav-btn')) {
                // セレクターを初期状態に戻さないよう、ホイールの選択状態のみ部分リセット（維持したい場合はこの処理はスルーも可能ですが、快適性のために空欄クリック解除をサポート）
                // ユーザー利便性のため今回は維持
            }
        });

        // 🎬 ページフェードイン・アウト処理
        window.addEventListener('DOMContentLoaded', () => {
            const overlay = document.getElementById('fadeOverlay');
            setTimeout(() => {
                overlay.style.opacity = '0';
            }, 50);
        });

        function navigateWithFade(url) {
            const overlay = document.getElementById('fadeOverlay');
            overlay.style.opacity = '1';
            setTimeout(() => {
                window.location.href = url;
            }, 400);
        }
    </script>
</body>
</html>
